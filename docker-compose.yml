services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: macro
      POSTGRES_PASSWORD: macro
      POSTGRES_DB: macro
    ports:
      - "5433:5432"
    volumes:
      - macro-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macro -d macro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  macro-postgres-data:
